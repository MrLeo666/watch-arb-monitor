<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>錶市套利監控台 · Watch Arbitrage Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#10141a; --panel:#171d26; --panel2:#1d2530; --line:#2a3542;
  --text:#e8edf2; --muted:#8b98a5; --gold:#c9a961; --gold-dim:#8a744a;
  --blue:#7fa8d0; --green:#4ade80; --red:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{background:var(--ink);color:var(--text);font-family:"Noto Sans TC",system-ui,sans-serif;font-size:14px;line-height:1.5;overflow-x:hidden}
.mono{font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums}

header{padding:26px 22px 18px;border-bottom:1px solid var(--line)}
.masthead{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;max-width:1400px;margin:0 auto}
h1{font-family:"Cormorant Garamond",serif;font-size:30px;font-weight:600;letter-spacing:.5px;color:var(--gold)}
.masthead .en{color:var(--muted);font-size:12px;letter-spacing:2.5px;text-transform:uppercase}
.updated{margin-left:auto;color:var(--muted);font-size:12px}

.controls{position:sticky;top:0;z-index:10;background:rgba(16,20,26,.97);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);padding:12px 22px}
.controls-inner{max-width:1400px;margin:0 auto;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input[type=text],select{background:var(--panel2);color:var(--text);border:1px solid var(--line);padding:8px 11px;border-radius:8px;font-size:13px;font-family:inherit;max-width:100%}
input[type=text]{min-width:220px;flex:1;max-width:340px}
input[type=text]:focus,select:focus{outline:2px solid var(--gold-dim);outline-offset:0}
.toggle{display:flex;align-items:center;gap:6px;color:var(--muted);cursor:pointer;font-size:13px;user-select:none;padding:8px 4px}
.toggle input{accent-color:var(--gold);width:16px;height:16px}
.stats{margin-left:auto;color:var(--muted);font-size:12px}
.stats b{color:var(--gold)}

main{max-width:1400px;margin:0 auto;padding:10px 22px 70px}
.brand-head{display:flex;align-items:baseline;gap:12px;margin:30px 0 8px;border-bottom:1px solid var(--line);padding-bottom:6px}
.brand-head h2{font-family:"Cormorant Garamond",serif;font-size:24px;font-weight:600;color:var(--text)}
.brand-head .n{color:var(--muted);font-size:12px}

/* ---- data table (desktop: CSS table layout) ---- */
.tbl{display:table;width:100%;border-collapse:collapse}
.thead{display:table-header-group}
.trow{display:table-row}
.lot{display:table-row}
.cell{display:table-cell;padding:9px 10px;border-bottom:1px solid #1b222c;vertical-align:top}
.thead .cell{color:var(--muted);font-weight:500;font-size:11px;letter-spacing:1px;text-transform:uppercase;text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
.lot:hover .cell{background:var(--panel)}
.lot.newlot .cell{background:rgba(201,169,97,.07)}
.lot.newlot .cell.c-img{box-shadow:inset 3px 0 0 var(--gold)}
.cell.c-img{width:116px}
.cell.c-status{width:110px}
.cell.c-date{width:100px}
.cell.num,.thead .cell.num{text-align:right}
.cell .lbl{display:none}
.title-cell a{color:var(--text);text-decoration:none}
.title-cell a:hover{color:var(--gold)}
.sub{color:var(--muted);font-size:12px;margin-top:2px}
.chip{display:inline-block;font-size:11px;padding:1px 8px;border-radius:10px;border:1px solid var(--line);color:var(--muted);white-space:nowrap}
.chip.live{color:var(--green);border-color:#245239}
.chip.live::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:5px;animation:pulse 1.6s infinite}
.chip.past{color:var(--muted)}
.chip.up{color:var(--blue);border-color:#2b4258}
.chip.review{color:var(--red);border-color:#5a2e2e}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.thumb{width:104px;height:104px;object-fit:cover;border-radius:10px;border:1px solid var(--line);display:block;background:var(--panel2)}
.thumb-empty{width:104px;height:104px;border-radius:10px;border:1px dashed var(--line)}
.lot:hover .thumb{border-color:var(--gold-dim)}
#peek{position:fixed;z-index:99;pointer-events:none;display:none;background:var(--panel);border:1px solid var(--gold-dim);border-radius:12px;padding:6px;box-shadow:0 12px 40px rgba(0,0,0,.6)}
#peek img{display:block;max-width:420px;max-height:420px;border-radius:8px}
.sold{color:var(--gold)}
.margin-pos{color:var(--green);font-weight:600}
.empty{padding:60px 0;text-align:center;color:var(--muted)}
footer{border-top:1px solid var(--line);color:var(--muted);font-size:12px;padding:16px 22px;max-width:1400px;margin:0 auto}

/* ---- mobile: card layout, zero horizontal scroll ---- */
@media (max-width:760px){
  body{font-size:13px}
  header{padding:18px 16px 12px}
  .masthead{gap:8px}
  h1{font-size:23px}
  .masthead .en{font-size:10px;letter-spacing:1.5px}
  .updated{margin-left:0;width:100%;font-size:11px}

  .controls{padding:10px 14px}
  .controls-inner{gap:8px}
  input[type=text]{flex:1 1 100%;min-width:0;max-width:none;padding:10px 12px;font-size:16px} /* 16px 防止 iOS 聚焦自動縮放 */
  select{flex:1 1 0;min-width:0;padding:9px 8px;font-size:13px}
  .toggle{padding:6px 4px 6px 0}
  .stats{width:100%;margin-left:0;text-align:right}

  main{padding:8px 14px 60px}
  .brand-head{margin:22px 0 10px}
  .brand-head h2{font-size:20px}

  .thead{display:none}
  .tbl,.lot,.cell{display:block}
  .lot{
    display:grid;grid-template-columns:88px minmax(0,1fr);column-gap:12px;row-gap:4px;align-items:start;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:12px;
  }
  .lot.newlot{border-color:var(--gold-dim)}
  .lot.newlot .cell.c-img{box-shadow:none}
  .lot:hover .cell{background:transparent}
  .cell{padding:0;border:none}
  .cell.c-img{grid-column:1;grid-row:1/span 3;width:auto}
  .thumb,.thumb-empty{width:88px;height:88px}
  .cell.c-status{grid-column:2;display:flex;gap:6px;flex-wrap:wrap;width:auto}
  .cell.c-title{grid-column:2;min-width:0;overflow-wrap:anywhere}
  .cell.c-platform{grid-column:2;font-size:11px;color:var(--muted);overflow-wrap:anywhere}
  .cell.c-platform .sub{display:inline;font-size:11px;margin-top:0}
  .cell.c-usd{display:none}
  .cell.c-date,.cell.c-est,.cell.c-price,.cell.c-fv,.cell.c-margin{
    grid-column:1/-1;display:flex;justify-content:space-between;align-items:baseline;gap:12px;
    padding:6px 0;border-top:1px solid #222b36;text-align:right;
  }
  .cell.c-date{margin-top:6px}
  .cell .lbl{display:inline;color:var(--muted);font-size:11px;letter-spacing:.5px;text-align:left}
  .cell .val{min-width:0;overflow-wrap:anywhere}
  .cell.c-fv .sub{font-size:10px;margin-top:0}
  .m-lot{display:none}
  #peek{display:none !important}
  footer{padding:14px 16px;font-size:11px;line-height:1.6}
}
@media (prefers-reduced-motion: reduce){.chip.live::before{animation:none}}
</style>
</head>
<body>
<header>
  <div class="masthead">
    <h1>錶市套利監控台</h1>
    <span class="en">Watch Auction Arbitrage Monitor</span>
    <span class="updated" id="updated"></span>
  </div>
</header>

<div class="controls">
  <div class="controls-inner">
    <input type="text" id="q" placeholder="搜尋型號 / 參考編號 / 關鍵字…" aria-label="搜尋">
    <select id="brand" aria-label="品牌"><option value="">全部品牌</option></select>
    <select id="platform" aria-label="平台"><option value="">全部平台</option></select>
    <select id="status" aria-label="狀態">
      <option value="active" selected>進行中 + 即將上拍</option>
      <option value="live">僅進行中(可出價)</option>
      <option value="past">過往成交(參考價)</option>
      <option value="">全部</option>
    </select>
    <label class="toggle"><input type="checkbox" id="newOnly">只看新標的</label>
    <label class="toggle"><input type="checkbox" id="flagOnly">只看套利標記</label>
    <span class="stats" id="stats"></span>
  </div>
</div>

<main id="main"></main>

<footer>
  買家佣金、稅費依各場 Conditions of Sale 為準。公允價兩種來源:C24(n)=Chrono24 同參考編號最低要價×0.85(保守經銷出貨淨得,n=掛牌數);comps(n)=內部成交檔案中位數。均未經品相調整,僅供初篩;毛利為估算。私人研究用途。
</footer>

<script>
let LOTS=[];
const $=id=>document.getElementById(id);
const fmt=(n)=>n==null?'—':Number(n).toLocaleString('en-US',{maximumFractionDigits:0});

async function load(){
  try{
    const [lots,meta]=await Promise.all([
      fetch('lots.json?_='+Date.now()).then(r=>r.json()),
      fetch('meta.json?_='+Date.now()).then(r=>r.json()).catch(()=>null)
    ]);
    LOTS=lots;
    if(meta&&meta.updated_at) $('updated').textContent='更新於 '+meta.updated_at.slice(0,16).replace('T',' ')+' UTC';
    const bs=[...new Set(LOTS.map(l=>l.brand))].sort();
    const ps=[...new Set(LOTS.map(l=>l.platform))].sort();
    bs.forEach(b=>$('brand').add(new Option(b,b)));
    ps.forEach(p=>$('platform').add(new Option(p,p)));
    render();
  }catch(e){
    $('main').innerHTML='<div class="empty">無法載入 lots.json — 請先執行 build.py 產生資料。</div>';
  }
}

function imgUrl(l,w){
  const u=l.image_url||'';
  if(!u)return u;
  if(l.platform==='Phillips'){const b=u.split('?')[0];return b+'?fit=bounds&width='+w+'&optimize=medium';}
  return u; // Bezel/Loupe This originals are already large; Antiquorum only serves medium
}
function statusChip(l){
  if(l.status==='live') return '<span class="chip live">進行中</span>';
  if(l.status==='past') return '<span class="chip past">已成交</span>';
  return '<span class="chip up">即將上拍</span>';
}

function render(){
  const q=$('q').value.trim().toLowerCase();
  const rows=LOTS.filter(l=>{
    if($('brand').value&&l.brand!==$('brand').value)return false;
    if($('platform').value&&l.platform!==$('platform').value)return false;
    const st=$('status').value;
    if(st==='active'&&l.status==='past')return false;
    if(st==='live'&&l.status!=='live')return false;
    if(st==='past'&&l.status!=='past')return false;
    if($('newOnly').checked&&!l.is_new)return false;
    if($('flagOnly').checked&&!l.arb_flag)return false;
    if(q&&!((l.title_raw||'')+' '+(l.auction_name||'')).toLowerCase().includes(q))return false;
    return true;
  });
  $('stats').innerHTML=`<b>${rows.length}</b> / ${LOTS.length} 件`;

  // group by brand, whitelist-priority order
  const groups={};
  rows.forEach(l=>{(groups[l.brand]=groups[l.brand]||[]).push(l)});
  const order=Object.keys(groups).sort((a,b)=>groups[b].length-groups[a].length);

  let html='';
  for(const b of order){
    const g=groups[b].sort((x,y)=>(x.status==='past')-(y.status==='past')||(x.auction_date||'').localeCompare(y.auction_date||''));
    html+=`<div class="brand-head"><h2>${b}</h2><span class="n">${g.length} 件</span></div>
    <div class="tbl"><div class="thead"><div class="trow">
      <div class="cell c-img">圖</div>
      <div class="cell c-status">狀態</div><div class="cell c-title">拍品</div><div class="cell c-platform">平台 / 場次</div>
      <div class="cell c-date">日期</div>
      <div class="cell c-est num">估價</div><div class="cell c-usd num">USD</div>
      <div class="cell c-price num">現價 / 成交</div><div class="cell c-fv num">公允 USD</div><div class="cell c-margin num">毛利%</div>
    </div></div>`;
    for(const l of g){
      const est=l.estimate_low?`${l.estimate_currency} ${fmt(l.estimate_low)}–${fmt(l.estimate_high)}`:'—';
      let px='—',cls='';
      if(l.current_bid!=null){px=`USD ${fmt(l.current_bid)}`;cls='mono';}
      else if(l.sold_price!=null){px=`${l.estimate_currency} ${fmt(l.sold_price)}`;cls='mono sold';}
      const mr=l.arb_margin_pct!=null?`<span class="${l.arb_margin_pct>0?'margin-pos':''}">${l.arb_margin_pct}</span>`:'—';
      const fvSrc=l.fair_value_source?`<div class="sub">${l.fair_value_source}${l.c24_count?` · ${l.c24_count}掛牌`:''}</div>`:'';
      const fv=l.fair_value_usd!=null?`${fmt(l.fair_value_usd)}${fvSrc}`:'—';
      const rev=l.manual_review?' <span class="chip review">須人工核對</span>':'';
      const thumb=l.image_url
        ?`<a href="${l.source_url}" target="_blank" rel="noopener"><img class="thumb" loading="lazy" src="${imgUrl(l,240)}" data-large="${imgUrl(l,800)}" alt="" onerror="this.style.display='none'"></a>`
        :'<div class="thumb thumb-empty"></div>';
      html+=`<div class="lot ${l.is_new?'newlot':''}">
        <div class="cell c-img">${thumb}</div>
        <div class="cell c-status">${statusChip(l)}</div>
        <div class="cell c-title title-cell"><a href="${l.source_url}" target="_blank" rel="noopener">${l.title_raw||''}</a>${rev}
          <div class="sub m-lot">Lot ${l.lot_number||'—'}</div></div>
        <div class="cell c-platform">${l.platform}<div class="sub">${l.auction_name||''}</div></div>
        <div class="cell c-date"><span class="lbl">日期</span><span class="val mono">${l.auction_date||'—'}</span></div>
        <div class="cell c-est num"><span class="lbl">估價</span><span class="val mono">${est}</span></div>
        <div class="cell c-usd num"><span class="lbl">USD</span><span class="val mono">${fmt(l.estimate_low_usd)}</span></div>
        <div class="cell c-price num"><span class="lbl">${l.status==='past'?'成交價':'現價'}</span><span class="val ${cls}">${px}</span></div>
        <div class="cell c-fv num"><span class="lbl">公允 USD</span><span class="val mono">${fv}</span></div>
        <div class="cell c-margin num"><span class="lbl">毛利%</span><span class="val mono">${mr}</span></div>
      </div>`;
    }
    html+='</div>';
  }
  $('main').innerHTML=html||'<div class="empty">沒有符合條件的拍品。</div>';
}

['q','brand','platform','status','newOnly','flagOnly'].forEach(id=>$(id).addEventListener('input',render));
load();

// hover zoom preview (desktop only)
if(matchMedia('(hover:hover) and (pointer:fine)').matches){
  const peek=document.createElement('div');peek.id='peek';peek.innerHTML='<img>';document.body.appendChild(peek);
  const peekImg=peek.querySelector('img');
  document.addEventListener('mouseover',e=>{
    const t=e.target.closest('.thumb');
    if(t&&t.dataset.large){peekImg.src=t.dataset.large;peek.style.display='block';}
  });
  document.addEventListener('mousemove',e=>{
    if(peek.style.display!=='block')return;
    const pad=18,w=peek.offsetWidth,hgt=peek.offsetHeight;
    let x=e.clientX+pad,y=e.clientY+pad;
    if(x+w>innerWidth)x=e.clientX-w-pad;
    if(y+hgt>innerHeight)y=Math.max(8,innerHeight-hgt-8);
    peek.style.left=x+'px';peek.style.top=y+'px';
  });
  document.addEventListener('mouseout',e=>{
    if(e.target.closest&&e.target.closest('.thumb'))peek.style.display='none';
  });
}
</script>
</body>
</html>
